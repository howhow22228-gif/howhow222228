<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>借代詞語配對挑戰</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background: linear-gradient(135deg, #e0f2fe 0%, #fdf4ff 50%, #fffbeb 100%);
            background-attachment: fixed;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        /* 標題閃耀動畫 */
        @keyframes shine {
            0% { background-position: 200% center; }
            100% { background-position: -200% center; }
        }
        .title-glow {
            background: linear-gradient(to right, #2563eb, #7c3aed, #db2777, #2563eb);
            background-size: 200% auto;
            color: transparent;
            -webkit-background-clip: text;
            background-clip: text;
            animation: shine 4s linear infinite;
        }

        /* 錯誤震動 */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-5px); color: #ef4444; }
            40%, 80% { transform: translateX(5px); color: #ef4444; }
        }
        .shake-anim { animation: shake 0.4s ease-in-out; }

        /* 成功彈出 */
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0.5; }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }
        .pop-anim { animation: pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }

        /* 選項按鈕樣式 */
        .option-btn { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .option-btn.active {
            background-color: #fef08a !important; 
            border-color: #eab308 !important;
            transform: scale(1.08) translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(234, 179, 8, 0.3);
            color: #854d0e !important;
            z-index: 10;
        }
        .option-btn.used {
            opacity: 0.3;
            pointer-events: none;
            filter: grayscale(100%);
        }

        /* 注釋視窗動畫 */
        #annotation-modal {
            opacity: 0;
            pointer-events: none;
            transition: all 0.3s backdrop-filter ease;
            backdrop-filter: blur(0px);
        }
        #annotation-modal.show {
            opacity: 1;
            pointer-events: auto;
            backdrop-filter: blur(8px);
        }
        #annotation-content {
            transform: scale(0.9) translateY(20px);
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #annotation-modal.show #annotation-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        /* 煙火特效畫布 */
        #confetti-canvas {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9999;
        }
    </style>
</head>
<body class="text-slate-800 pb-12">
    <canvas id="confetti-canvas"></canvas>

    <!-- 目錄頁 (Menu) -->
    <div id="menu-view" class="max-w-6xl mx-auto px-4 pt-12">
        <div class="text-center mb-12">
            <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-widest drop-shadow-sm">
                <span class="title-glow">借代詞語配對挑戰</span>
            </h1>
            <p class="text-lg md:text-xl text-slate-500 font-bold tracking-widest">國學常識 ‧ 典藏互動精裝版</p>
        </div>
        
        <!-- 教學操作說明 (毛玻璃風格) -->
        <div class="bg-white/60 backdrop-blur-md rounded-3xl p-6 md:p-8 mb-12 shadow-xl border border-white/50 relative overflow-hidden">
            <div class="absolute top-0 right-0 w-32 h-32 bg-blue-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            <div class="absolute bottom-0 left-0 w-32 h-32 bg-purple-400 rounded-full mix-blend-multiply filter blur-3xl opacity-20"></div>
            
            <h2 class="text-indigo-800 font-black text-2xl mb-5 flex items-center gap-3 relative z-10">
                <span class="bg-indigo-100 p-2 rounded-xl">🎮</span> 闖關指南
            </h2>
            <div class="grid md:grid-cols-2 gap-4 relative z-10 text-lg font-medium text-slate-700">
                <div class="flex gap-3 items-start"><span class="text-2xl">👆</span><p>先點擊上方 <b class="text-blue-600">發光選項</b>，再點擊下方 <b class="text-blue-600">括號</b> 進行配對作答。</p></div>
                <div class="flex gap-3 items-start"><span class="text-2xl">💡</span><p>點擊題目的 <b class="text-amber-600">注釋按鈕</b>，可看超大國學解析（點畫面空白處收回）。</p></div>
                <div class="flex gap-3 items-start"><span class="text-2xl">🎵</span><p>開啟喇叭！答對有 <b class="text-green-600">獎勵音效</b>，破關還有神秘慶祝儀式！</p></div>
                <div class="flex gap-3 items-start"><span class="text-2xl">💾</span><p>系統會自動記憶進度，隨時點擊 <b class="text-slate-500">重新練習</b> 刷新重來。</p></div>
            </div>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="level-grid">
            <!-- 關卡卡片由 JS 動態生成 -->
        </div>
    </div>

    <!-- 遊戲頁 (Game) -->
    <div id="game-view" class="max-w-6xl mx-auto px-4 pt-8 hidden">
        <!-- 頂部導覽列 -->
        <div class="flex flex-col md:flex-row justify-between items-start md:items-center bg-white/70 backdrop-blur-md rounded-2xl p-4 shadow-sm border border-white mb-6 gap-4">
            <div class="flex items-center gap-4">
                <div class="w-2 h-10 bg-gradient-to-b from-blue-500 to-purple-500 rounded-full"></div>
                <h2 class="text-3xl md:text-4xl font-black text-slate-800" id="game-title">關卡標題</h2>
            </div>
            <div class="flex gap-3 self-end md:self-auto">
                <button onclick="returnToMenu()" class="px-5 py-2.5 bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-xl font-bold transition-colors shadow-sm">
                    ⬅️ 返回目錄
                </button>
                <button onclick="resetCurrentLevel()" class="px-5 py-2.5 bg-rose-50 border border-rose-200 hover:bg-rose-100 text-rose-600 rounded-xl font-bold transition-colors shadow-sm">
                    ↺ 重新練習
                </button>
            </div>
        </div>

        <!-- 遊戲主體區塊 -->
        <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl border border-white overflow-hidden relative">
            <!-- 上方選項區 -->
            <div class="bg-gradient-to-r from-blue-50/90 to-indigo-50/90 border-b border-blue-100 p-5 md:p-8 sticky top-0 z-10 shadow-sm">
                <div class="flex flex-wrap justify-center gap-3" id="options-container">
                    <!-- 選項按鈕由 JS 動態生成 -->
                </div>
            </div>

            <!-- 下方題目區 -->
            <div class="p-6 md:p-10">
                <div class="grid grid-cols-1 xl:grid-cols-2 gap-x-16 gap-y-6" id="questions-container">
                    <!-- 題目由 JS 動態生成 -->
                </div>
            </div>
        </div>
    </div>

    <!-- 全螢幕超大注釋 Modal -->
    <div id="annotation-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 cursor-pointer" onclick="closeAnnotation()">
        <div class="bg-[#fdfbf7] border-l-[16px] border-[#d97706] shadow-[0_25px_60px_rgba(0,0,0,0.4)] rounded-3xl p-8 md:p-12 max-w-4xl w-full relative" id="annotation-content" onclick="event.stopPropagation()">
            <!-- 裝飾浮水印 -->
            <div class="absolute top-4 right-6 text-9xl text-amber-100/50 font-serif italic pointer-events-none select-none">”</div>
            
            <div class="flex justify-between items-start mb-6 relative z-10">
                <h3 class="text-xl md:text-2xl font-bold text-amber-700 bg-amber-100 px-4 py-1.5 rounded-full inline-flex items-center gap-2">
                    <span class="text-2xl">📖</span> 國學常識解碼
                </h3>
                <button onclick="closeAnnotation()" class="bg-slate-100 hover:bg-slate-200 text-slate-500 rounded-full p-2 transition-colors">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="relative z-10">
                <h4 id="annotation-title" class="text-3xl md:text-5xl font-black text-indigo-900 mb-6 drop-shadow-sm">詞語</h4>
                <p id="annotation-text" class="text-2xl md:text-3xl text-slate-700 leading-relaxed font-medium">注釋內容</p>
            </div>
            
            <div class="mt-12 text-center relative z-10">
                <span class="inline-block bg-slate-100 text-slate-400 px-6 py-2 rounded-full font-bold text-sm md:text-base animate-pulse cursor-pointer" onclick="closeAnnotation()">
                    點擊此處或畫面空白處收回視窗
                </span>
            </div>
        </div>
    </div>

    <script>
        // === 1. 動態彩帶特效系統 (Confetti) ===
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let confettiAnimationId;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function fireConfetti() {
            particles = [];
            const colors = ['#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'];
            for (let i = 0; i < 150; i++) {
                particles.push({
                    x: canvas.width / 2,
                    y: canvas.height / 2 + 100,
                    r: Math.random() * 8 + 4,
                    dx: Math.random() * 20 - 10,
                    dy: Math.random() * -15 - 5,
                    color: colors[Math.floor(Math.random() * colors.length)],
                    tilt: Math.random() * 10,
                    tiltAngle: 0,
                    tiltAngleInc: (Math.random() * 0.07) + 0.05
                });
            }
            if (!confettiAnimationId) animateConfetti();
        }

        function animateConfetti() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let active = false;
            particles.forEach(p => {
                p.tiltAngle += p.tiltAngleInc;
                p.y += (Math.cos(p.tiltAngle) + p.dy + p.r / 2) / 2;
                p.x += Math.sin(p.tiltAngle) * 2 + p.dx;
                p.dy += 0.15; // Gravity

                if (p.y <= canvas.height) active = true;

                ctx.beginPath();
                ctx.lineWidth = p.r;
                ctx.strokeStyle = p.color;
                ctx.moveTo(p.x + p.tilt + p.r, p.y);
                ctx.lineTo(p.x + p.tilt, p.y + p.tilt + p.r);
                ctx.stroke();
            });

            if (active) {
                confettiAnimationId = requestAnimationFrame(animateConfetti);
            } else {
                cancelAnimationFrame(confettiAnimationId);
                confettiAnimationId = null;
                ctx.clearRect(0, 0, canvas.width, canvas.height);
            }
        }

        // === 2. 音效引擎 (Web Audio API) ===
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) audioCtx = new AudioContext();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }

        function playTone(freq, type, duration, vol, startTimeOffset) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime + startTimeOffset);
            
            gain.gain.setValueAtTime(0, audioCtx.currentTime + startTimeOffset);
            gain.gain.linearRampToValueAtTime(vol, audioCtx.currentTime + startTimeOffset + 0.05);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + startTimeOffset + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(audioCtx.currentTime + startTimeOffset);
            osc.stop(audioCtx.currentTime + startTimeOffset + duration);
        }

        // 點擊選項聲
        function playClickSound() {
            initAudio();
            playTone(800, 'sine', 0.1, 0.05, 0);
        }

        // 錯誤低鳴聲
        function playErrorSound() {
            initAudio();
            playTone(150, 'sawtooth', 0.3, 0.1, 0);
            playTone(100, 'square', 0.3, 0.1, 0.1);
        }

        // 成功叮咚聲
        function playSuccessSound() {
            initAudio();
            playTone(523.25, 'sine', 0.2, 0.1, 0);      
            playTone(659.25, 'sine', 0.2, 0.1, 0.1);    
            playTone(783.99, 'triangle', 0.5, 0.15, 0.2); 
        }

        // 破關歡呼和弦
        function playCheerSound() {
            initAudio();
            const notes = [261.63, 329.63, 392.00, 523.25]; // C, E, G, C
            notes.forEach((freq, i) => {
                playTone(freq, 'triangle', 0.4, 0.1, i * 0.1);
            });
            setTimeout(() => {
                playTone(523.25, 'sine', 1.5, 0.15, 0);
                playTone(659.25, 'sine', 1.5, 0.15, 0);
                playTone(783.99, 'triangle', 1.5, 0.15, 0);
                playTone(1046.50, 'triangle', 1.5, 0.15, 0);
            }, 400);
        }

        // === 3. 完整題庫資料 (所有 90 題皆含豐富注釋) ===
        const db = [
            {
                id: 'p1', title: '人物篇（一）01-15',
                items: [
                    { n: '01', t: '曾參', a: '孝子', note: '曾參是春秋時期孔子的弟子，以「孝道」聞名天下，被後世尊為「宗聖」。' },
                    { n: '02', t: '陛下', a: '皇上', note: '「陛」是宮殿的臺階。臣子不敢直呼君主，故呼叫臺階下的侍衛代為傳達，後成為對帝王的尊稱。' },
                    { n: '03', t: '東宮', a: '太子', note: '古代太子居住在皇宮東邊的宮殿，根據陰陽五行，東方屬木，代表生機與儲君，故以「東宮」借代太子。' },
                    { n: '04', t: '布衣 黔首', a: '平民', note: '「布衣」指平民穿的粗麻布衣服；「黔首」指平民以黑色的頭巾裹頭（黔：黑色），皆代指平民。' },
                    { n: '05', t: '冠蓋 簪纓 軒冕', a: '達官顯貴', note: '冠蓋指官員的帽子與車蓋；簪纓指官帽的裝飾；軒冕指大夫以上的車乘與禮服。皆為達官貴人的標配。' },
                    { n: '06', t: '朱門', a: '富貴人家', note: '古代王公貴族、富豪人家的住宅大門通常漆成氣派的「紅色（朱色）」，如杜甫詩：「朱門酒肉臭」。' },
                    { n: '07', t: '烏紗帽', a: '官職', note: '原為明代文武百官的標準官帽，後來成為「官職」的代名詞（例如：保不住烏紗帽）。' },
                    { n: '08', t: '黃髮 白首 雞皮鶴髮 鮐背', a: '老人', note: '黃髮指老人頭髮由白轉黃；鮐背(ㄊㄞˊ)指老人背上生出如鮐魚般的斑紋。鶴髮、白首皆指白髮。' },
                    { n: '09', t: '黃口 垂髫 總角', a: '小孩', note: '黃口原指雛鳥；垂髫(ㄊㄧㄠˊ)指兒童下垂的頭髮；總角指古代兒童綁在頭頂兩側的髮髻。' },
                    { n: '10', t: '襁褓', a: '嬰兒', note: '「襁褓(ㄑㄧㄤˇ ㄅㄠˇ)」是指用來包裹、背負嬰兒的寬布被與帶子。' },
                    { n: '11', t: '西席 春風', a: '老師', note: '古人席位以西為尊，常讓家塾教師坐西席；「春風化雨」比喻老師美好的教導恩澤。' },
                    { n: '12', t: '桃李 青衿', a: '學生', note: '桃李指老師辛勤栽培的優秀學生（桃李滿天下）；青衿指古代學子穿著的青色交領服裝。' },
                    { n: '13', t: '同窗 硯右', a: '同學', note: '同窗指同在一個窗下讀書；硯右指共用同一個硯台，皆借代為同學。' },
                    { n: '14', t: '舊雨 故人', a: '老朋友', note: '杜甫曾寫過朋友在下雨天依然來訪，後以「舊雨」指老朋友（相對於新交的「新雨」）。故人亦指老友。' },
                    { n: '15', t: '手足', a: '兄弟', note: '兄弟如同人身上的手和腳，關係密切、同體相連且不可分離。' }
                ]
            },
            {
                id: 'p2', title: '人物篇（二）16-31',
                items: [
                    { n: '16', t: '椿堂', a: '父親', note: '莊子記載椿樹木質堅實且長命，古人常以「大椿」祝人長壽，後代指父親。' },
                    { n: '17', t: '萱堂', a: '母親', note: '萱草又名「忘憂草」，古人常種於母親居住的北堂，祈求母親無憂，故代稱母親。' },
                    { n: '18', t: '無冕王', a: '記者', note: '記者雖然沒有實質的官位（沒有戴冕冠），卻能透過輿論產生極大的社會影響力。' },
                    { n: '19', t: '紅顏', a: '美人、少年', note: '指年輕貌美、紅潤的容顏，多用來指稱美女（如：紅顏薄命）或青春少男少女。' },
                    { n: '20', t: '朱顏', a: '少年', note: '朱色即紅色，紅潤的臉容象徵著青春年少的時光，如李煜詞：「朱顏辭鏡花辭樹」。' },
                    { n: '21', t: '巾幗 紅袖', a: '女子', note: '巾幗(ㄍㄨㄛˊ)是古代婦女的頭巾和髮飾（如：巾幗不讓鬚眉）；紅袖指女子常穿的紅色衣袖。' },
                    { n: '22', t: '鬚眉', a: '男子', note: '男子的鬍鬚與濃眉，古人以此作為男子漢的外在特徵來代稱全體。' },
                    { n: '23', t: '結髮', a: '妻子', note: '古代男女成婚時，各剪下一綹頭髮結在一起，象徵永結同心，專指原配妻子（結髮妻）。' },
                    { n: '24', t: '騷人 墨客', a: '詩人 文人', note: '騷人本指作《離騷》的屈原，後泛指憂國憂民的詩人；墨客指喜歡舞文弄墨的文人。' },
                    { n: '25', t: '泰山', a: '岳父', note: '唐玄宗封禪泰山，張垍藉機讓岳父升官的故事，後世幽默地用以稱呼妻子的父親。' },
                    { n: '26', t: '泰水', a: '岳母', note: '因為岳父被稱為「泰山」，為了對仗與呼應，岳母便被稱為「泰水」。' },
                    { n: '27', t: '東床', a: '女婿', note: '晉代王羲之曾「坦腹東床」毫不做作，被郗太傅相中選為女婿，後世便以東床代指好女婿。' },
                    { n: '28', t: '執牛耳', a: '領導者', note: '古代諸侯歃血為盟時，由主盟者（老大）親手割下牛耳取血，故稱領導者為「執牛耳」。' },
                    { n: '29', t: '樑上君子 三隻手', a: '竊賊', note: '東漢陳寔見小偷躲在屋樑上，便呼喚子孫訓誡：「不善之人未必本惡，樑上君子者是矣」。' },
                    { n: '30', t: '梨園子弟', a: '演戲的人', note: '唐玄宗曾於皇宮禁苑中的「梨園」親自訓練樂工與歌舞，後世便以梨園子弟代指戲劇界演員。' },
                    { n: '31', t: '東道主', a: '主人', note: '春秋時鄭國在秦國以東，鄭文公對秦穆公說願做「東方道路上的主人」招待使者，後指請客的主人。' }
                ]
            },
            {
                id: 'p3', title: '人物篇（三）32-43',
                items: [
                    { n: '32', t: '兩腳書櫥', a: '書呆子', note: '譏諷只會死讀書、不知靈活運用的人，就像長了兩隻腳會走路的書櫃一樣。' },
                    { n: '33', t: '有腳書櫥', a: '學問淵博的人', note: '這是正面的讚美，形容人學識淵博、記誦廣博，猶如會自行走動的百科全書。' },
                    { n: '34', t: '白衣天使', a: '護士', note: '護理人員穿著純白色的護士服照顧病患，猶如帶來希望與純潔的天使。' },
                    { n: '35', t: '綠衣天使', a: '郵差', note: '臺灣的郵務人員制服為綠色，將信件包裹傳遞到千家萬戶，帶來遠方的消息。' },
                    { n: '36', t: '紈褲子弟 五陵年少 貴家公子', a: '富家子弟', note: '「紈褲」指富家子弟穿的細絹褲子；「五陵」指漢代富豪權貴聚集居住的五個皇陵區。' },
                    { n: '37', t: '西施 貂蟬 傾城 沉魚...', a: '美女', note: '西施、貂蟬為古代絕世美女；傾城、沉魚落雁形容極具魅力的容貌；粉黛為女子的化妝品。' },
                    { n: '38', t: '秋娘', a: '歌妓、年老色衰女子', note: '「秋娘」原為唐代歌妓常用的名字，後來泛指歌妓或年老色衰的女子（如白居易《琵琶行》中提到）。' },
                    { n: '39', t: '潘安 魏玠', a: '美男子', note: '潘安與魏玠（衛玠）皆為魏晉時期著名的絕世美男子，成語有「貌似潘安」。' },
                    { n: '40', t: '華陀', a: '醫術高明的人', note: '三國時代的名醫華佗，精通內外科，醫術如神，後用以稱讚醫術高明的醫生（再世華佗）。' },
                    { n: '41', t: '伯樂', a: '識才之人', note: '相傳春秋時有位非常善於相馬（挑選好馬）的人名叫孫陽，號伯樂。比喻善於發掘人才的人。' },
                    { n: '42', t: '圓顱方趾 圓頂方踵', a: '人類', note: '古人認為「天圓地方」，而人的頭顱是圓的、腳趾是方的，正符合天地之理，故代稱人類。' },
                    { n: '43', t: '陶朱', a: '商人', note: '春秋時期越國大夫范蠡，幫助越王勾踐復國後退隱經商致富，自號「陶朱公」，後世尊為商人之祖。' }
                ]
            },
            {
                id: 't1', title: '事物篇（一）01-09',
                items: [
                    { n: '01', t: '孤「帆」', a: '船', note: '「帆」是古代船隻航行時的重要特徵，文學上常以事物的局部特徵來借代全體（船隻）。' },
                    { n: '02', t: '絲竹 管絃', a: '音樂', note: '絲指弦樂器（如琴、瑟），竹指管樂器（如笛、簫），兩者合稱借代為音樂。' },
                    { n: '03', t: '案牘', a: '公文', note: '「案」是書桌，「牘」是古代用來書寫文字的木片。引申指在桌上處理的公務文書。' },
                    { n: '04', t: '桃符', a: '春聯', note: '古代畫有神荼、鬱壘兩位神將的桃木板，掛在門上用以避邪，為現今春聯的前身。' },
                    { n: '05', t: '羽觴', a: '酒杯', note: '古代一種飲酒的器具，呈橢圓形，兩側有像鳥翼的形狀，故稱羽觴(ㄕㄤ)。' },
                    { n: '06', t: '杜康 黃湯 杯中物', a: '酒', note: '杜康為傳說中發明釀酒的祖師爺；黃湯為酒的俗稱；杯中物泛指杯子裡裝的酒。' },
                    { n: '07', t: '五斗米', a: '微薄的薪水', note: '典出晉代陶淵明不願為微薄的俸祿逢迎諂媚（不為五斗米折腰），後用以指微薄的薪水。' },
                    { n: '08', t: '汗青 丹青', a: '史書', note: '古人在竹簡寫字前需用火烤乾水分防蛀（稱汗青）；「丹青」本指顏料，亦可借指史冊或圖畫。' },
                    { n: '09', t: '翰墨', a: '文章', note: '「翰」指寫字的毛筆（原指羽毛），「墨」指墨汁，泛指筆墨文章或書畫作品。' }
                ]
            },
            {
                id: 't2', title: '事物篇（二）10-17',
                items: [
                    { n: '10', t: '魚雁 雙鯉魚 尺素書', a: '書信', note: '「尺素」指白絹，古人常將信寫在白絹上；「雙鯉魚」指裝書信的木盒多雕刻成鯉魚狀。' },
                    { n: '11', t: '孔方兄 阿堵物', a: '錢', note: '銅錢外圓內方，故戲稱孔方兄；晉朝王衍自命清高口不提錢字，只稱之為「阿堵物」（意即：這東西）。' },
                    { n: '12', t: '束脩', a: '學費', note: '「束脩」本指十條肉乾。古人初次拜見老師時所奉上的微薄見面禮，後代指學費。' },
                    { n: '13', t: '盤纏', a: '旅費', note: '古代將銅錢串在繩子上，纏繞於腰間攜帶出門，故稱旅途所需的費用為盤纏。' },
                    { n: '14', t: '簡牘', a: '書籍', note: '「簡」和「牘」都是古代紙張發明前，用來書寫文字的竹片和木片。' },
                    { n: '15', t: '「方寸」大亂', a: '心', note: '中醫學與古人認為心臟的大小約有一寸見方，故以「方寸」借代指人的心靈、心緒。' },
                    { n: '16', t: '望穿「秋水」', a: '眼睛', note: '秋天的水域特別清澈明淨，文學上常用來比喻人清澈明亮的眼睛（多指女子）。' },
                    { n: '17', t: '青絲 三千煩惱絲', a: '頭髮', note: '青指黑色，青絲借指烏黑的頭髮；佛教認為頭髮代表世俗的煩惱，故稱三千煩惱絲。' }
                ]
            },
            {
                id: 'a1', title: '地域／領域篇 01-12',
                items: [
                    { n: '01', t: '東市', a: '刑場', note: '漢代和唐代國都長安的處決犯人之地多設在東市，後代指刑場。' },
                    { n: '02', t: '社稷 宗廟', a: '國家', note: '社為土神，稷為穀神；宗廟為君王祭祀祖先之處。皆與政權存亡息息相關，故代稱國家。' },
                    { n: '03', t: '桑梓', a: '故鄉、家園', note: '古人常在住宅旁栽種桑樹和梓樹，作為產業留給子孫，後代指故鄉或家園。' },
                    { n: '04', t: '廟堂', a: '朝廷', note: '宗廟與明堂，是古代帝王祭祀與議政的莊嚴場所，借代為朝廷。' },
                    { n: '05', t: '江湖', a: '民間', note: '原指江河湖泊，後引申為遠離朝廷的民間、社會大眾或隱士退隱居住的地方。' },
                    { n: '06', t: '九州 中原', a: '中國', note: '古代中國版圖劃分為九州；中原指黃河中下游地區，為華夏文化發源地，皆代稱中國。' },
                    { n: '07', t: '東瀛 扶桑', a: '日本', note: '中國古代傳說東海中有仙山東瀛、神樹扶桑，因為方位皆在東方海域，後來皆被借指為日本。' },
                    { n: '08', t: '四海', a: '天下各處', note: '古人認為中國大陸的四周皆為海洋所環繞（東海、南海、西海、北海），故稱全天下為「四海」。' },
                    { n: '09', t: '囹圄', a: '監獄', note: '「囹圄」讀音為 ㄌㄧㄥˊ ㄩˇ，字意本身即為監獄、牢房之意。' },
                    { n: '10', t: '梨園', a: '戲劇界', note: '唐玄宗曾於皇宮禁苑中的「梨園」親自訓練樂工與戲曲演員，後代指戲劇界。' },
                    { n: '11', t: '杏林', a: '醫界', note: '三國名醫董奉治病不收錢，只要求病癒者為他種杏樹，數年後蔚然成林。後代指醫學界。' },
                    { n: '12', t: '杏壇', a: '教育界', note: '相傳孔子曾於杏樹下築壇講學、撫琴，故後世以杏壇代指教育界。' }
                ]
            },
            {
                id: 'e1', title: '事件／動作篇（一）01-13',
                items: [
                    { n: '01', t: '刀鋸鼎鑊', a: '酷刑', note: '刀鋸為砍割的刑具；「鼎鑊」是古代用以活活烹煮犯人的大鍋。兩者皆泛指極殘酷的刑罰。' },
                    { n: '02', t: '祝融 回祿', a: '火災', note: '「祝融」與「回祿」皆為中國古代神話傳說中的火神，後代指火災（如：慘遭祝融之災）。' },
                    { n: '03', t: '干戈 烽火 兵馬 硝煙', a: '戰爭', note: '干戈為武器；烽火為邊防報警的煙火；兵馬為軍隊；硝煙為火藥煙霧。皆代指戰爭。' },
                    { n: '04', t: '玉帛', a: '和平', note: '古代諸侯會盟朝見時所帶的玉器和絲帛，象徵和平與友好（化干戈為玉帛）。' },
                    { n: '05', t: '殺青', a: '事情已完成', note: '古人製作竹簡需用火烤乾水分防蛀，此工序完成稱殺青，後指事情（如書籍寫成、電影拍攝）完成。' },
                    { n: '06', t: '飯碗', a: '工作', note: '用來盛飯的碗，借指賴以生存、謀生的職業或工作（如：鐵飯碗）。' },
                    { n: '07', t: '胡越', a: '相隔遙遠 外族', note: '胡在北方，越在南方，比喻相隔遙遠、互不相干，或泛指外族。' },
                    { n: '11', t: '折柳', a: '送別', note: '古人送別親友時，有折下柳枝相贈的習俗，柳諧音「留」，表達依依不捨之情。' },
                    { n: '12', t: '臨池', a: '寫書法', note: '相傳東漢書法家張芝臨池學書，洗筆硯使整個池水盡黑，後代指勤練寫書法。' },
                    { n: '13', t: '做東', a: '請客', note: '典出「東道主」，主人居於東方招待西來的賓客，後泛指請客出錢的人。' }
                ]
            },
            {
                id: 'e2', title: '事件／動作篇（二）14-26',
                items: [
                    { n: '14', t: '南面', a: '稱王', note: '古代帝王座位面向南方以聽天下，故指南面稱王。' },
                    { n: '15', t: '北面', a: '稱臣', note: '臣子覲見君王時，必須面向北方跪拜，故指稱臣。' },
                    { n: '16', t: '魚雁往返', a: '通信', note: '魚雁為傳遞書信的代稱，往返指雙方互相通信不絕。' },
                    { n: '17', t: '一日三「秋」', a: '年', note: '「秋」指秋收，因為古代農業社會一年一收，故以「秋」代指「年」。' },
                    { n: '21', t: '樹紅旗', a: '宣戰', note: '升起紅色的旗幟，象徵血戰到底、向敵方宣戰。' },
                    { n: '22', t: '舉白旗', a: '投降', note: '舉起白色的旗幟，在國際軍事慣例上表示投降或要求停戰。' },
                    { n: '23', t: '請纓 投筆從戎', a: '自願從軍', note: '請纓指請求授予長繩去縛番王；投筆指東漢班超丟下筆去從軍建功。' },
                    { n: '24', t: '剪燭西窗', a: '徹夜長談', note: '李商隱詩句「何當共剪西窗燭」，指在西窗下剪去燭蕊，徹夜長談訴說思念情懷。' },
                    { n: '25', t: '佩紫懷黃', a: '當官', note: '身佩紫色的印綬，懷揣黃金的印信，是古代高級長官的裝束。借指當大官。' },
                    { n: '26', t: '掛冠 懸車 致仕 解綬', a: '辭官', note: '懸車指七十歲告老還鄉不再用車；致仕為將官職交還國君；解綬為解下官印的絲帶。' }
                ]
            },
            {
                id: 'n1', title: '大自然篇 01-08',
                items: [
                    { n: '01', t: '蒼穹', a: '天空', note: '蒼指青色，穹指圓頂的帳篷，形容蒼藍色、廣闊如巨大帳篷般的天空。' },
                    { n: '02', t: '金烏', a: '太陽', note: '中國古代神話傳說，太陽中有一隻三足神鴉，故常以「金烏」代指太陽。' },
                    { n: '03', t: '桑麻', a: '農作物', note: '農家常種植用來養蠶的桑樹與編織用的麻，泛指一般農作物。' },
                    { n: '04', t: '玉兔 玉蟾 嬋娟', a: '月亮', note: '傳說月宮中有玉兔、蟾蜍；「嬋娟」形容姿態美好，蘇軾名句「千里共嬋娟」即指明月。' },
                    { n: '05', t: '東風、楊柳風', a: '春風', note: '春天風從東方吹來，吹拂著楊柳帶來生機，故稱東風或楊柳風。' },
                    { n: '06', t: '南風、薰風', a: '夏風', note: '夏天吹拂溫和的南風，帶有草木溫潤的香氣，令人感到和暖（薰風）。' },
                    { n: '07', t: '西風、金風', a: '秋風', note: '秋天吹西風，且在五行之中秋季屬「金」，故稱秋風為金風。' },
                    { n: '08', t: '北風、朔風', a: '冬風', note: '朔是指北方，冬天的寒冷刺骨之風皆來自北方，故稱北風或朔風。' }
                ]
            }
        ];

        // === 4. 遊戲核心狀態與邏輯 ===
        let currentLevelData = null;
        let optionsMap = []; 
        let activeOption = null; 
        let progressData = JSON.parse(localStorage.getItem('metonymy_progress_deluxe')) || {};

        function initMenu() {
            const grid = document.getElementById('level-grid');
            grid.innerHTML = '';
            
            db.forEach((level) => {
                const p = progressData[level.id] || { correct: 0 };
                const total = level.items.length;
                const isCleared = p.correct === total;
                
                let statusHtml = '';
                let borderClass = 'border-slate-200';
                
                if (isCleared) {
                    statusHtml = `<span class="bg-green-100 text-green-700 font-bold px-4 py-1.5 rounded-full text-sm flex items-center gap-1.5 shadow-sm"><span class="text-lg">🏆</span> 完美通關</span>`;
                    borderClass = 'border-green-300 shadow-green-100';
                } else if (p.correct > 0) {
                    statusHtml = `<span class="text-blue-700 font-bold text-sm bg-blue-50 px-4 py-1.5 rounded-full shadow-sm border border-blue-200">挑戰中 ${p.correct}/${total}</span>`;
                    borderClass = 'border-blue-300';
                } else {
                    statusHtml = `<span class="text-slate-400 font-medium text-sm bg-slate-50 px-4 py-1.5 rounded-full">未挑戰 (${total}題)</span>`;
                }

                grid.innerHTML += `
                    <div onclick="startLevel('${level.id}')" class="bg-white/90 backdrop-blur-sm rounded-3xl p-6 shadow-lg hover:shadow-2xl cursor-pointer border-2 ${borderClass} transition-all duration-300 hover:-translate-y-2 group relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-24 h-24 bg-gradient-to-br from-indigo-100 to-purple-100 rounded-full -mr-10 -mt-10 opacity-50 group-hover:scale-150 transition-transform duration-500 pointer-events-none"></div>
                        <h3 class="text-2xl font-black text-slate-800 mb-6 tracking-wide relative z-10">${level.title}</h3>
                        <div class="flex justify-between items-center relative z-10">
                            ${statusHtml}
                            <span class="text-white bg-indigo-500 group-hover:bg-indigo-600 shadow-md p-2.5 rounded-full transition-colors transform group-hover:rotate-12">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3" /></svg>
                            </span>
                        </div>
                    </div>
                `;
            });
        }

        function startLevel(levelId) {
            initAudio(); // 初始化音效
            currentLevelData = db.find(l => l.id === levelId);
            activeOption = null;
            
            if (!progressData[levelId]) {
                progressData[levelId] = { correct: 0, answers: {} };
            }
            if (!progressData[levelId].answers) {
                progressData[levelId].answers = {};
            }

            document.getElementById('game-title').textContent = currentLevelData.title;
            document.getElementById('menu-view').classList.add('hidden');
            document.getElementById('game-view').classList.remove('hidden');
            window.scrollTo(0, 0);

            generateGame();
        }

        function returnToMenu() {
            document.getElementById('game-view').classList.add('hidden');
            document.getElementById('menu-view').classList.remove('hidden');
            initMenu();
        }

        function resetCurrentLevel() {
            if(confirm("確定要清除本關卡的作答紀錄重新練習嗎？")) {
                progressData[currentLevelData.id] = { correct: 0, answers: {} };
                saveProgress();
                activeOption = null;
                generateGame();
            }
        }

        // --- 動態生成 UI 避免引號衝突 ---
        function generateGame() {
            const optionsContainer = document.getElementById('options-container');
            const questionsContainer = document.getElementById('questions-container');
            
            optionsContainer.innerHTML = '';
            questionsContainer.innerHTML = '';

            const uniqueAnswers = [...new Set(currentLevelData.items.map(item => item.a))];
            uniqueAnswers.sort(() => Math.random() - 0.5); 
            
            optionsMap = uniqueAnswers.map((ans, idx) => ({
                letter: String.fromCharCode(65 + idx), 
                meaning: ans
            }));

            // 渲染上方選項按鈕
            optionsMap.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn px-4 py-2.5 md:px-5 md:py-3 bg-white border-2 border-indigo-200 text-indigo-700 font-black text-lg md:text-xl rounded-2xl shadow-sm hover:bg-indigo-50 flex items-center gap-2.5';
                btn.id = `opt-btn-${opt.letter}`;
                
                const isUsed = isOptionFullyUsed(opt.meaning);
                if (isUsed) btn.classList.add('used');

                btn.innerHTML = `<span class="bg-indigo-100 text-indigo-800 px-2.5 py-0.5 rounded-lg shadow-sm text-base">${opt.letter}</span> <span>${opt.meaning}</span>`;
                btn.onclick = () => selectOption(opt, btn);
                optionsContainer.appendChild(btn);
            });

            // 渲染下方題目
            currentLevelData.items.forEach(item => {
                const isAnswered = progressData[currentLevelData.id].answers[item.n];
                const optForAnswer = optionsMap.find(o => o.meaning === item.a);

                const div = document.createElement('div');
                div.className = 'flex items-center text-xl py-4 border-b-2 border-slate-100 border-dashed hover:bg-blue-50/50 transition-colors rounded-xl px-3 group';
                
                // 題號
                const numSpan = document.createElement('span');
                numSpan.className = 'w-10 text-slate-400 font-black font-mono text-xl';
                numSpan.textContent = item.n + '.';
                div.appendChild(numSpan);
                
                // 括號作答區
                const blankArea = document.createElement('div');
                if (isAnswered) {
                    blankArea.className = 'blank-area filled mx-4 px-4 py-2 font-black text-green-700 flex items-center justify-center bg-green-50 border-2 border-green-300 rounded-xl shrink-0 w-[160px] md:w-[200px] shadow-sm pop-anim';
                    blankArea.innerHTML = `( <span class="tracking-widest ml-1">${optForAnswer.letter} ${item.a}</span> )`;
                } else {
                    blankArea.className = 'blank-area mx-4 px-2 py-2 text-slate-300 font-black cursor-pointer shrink-0 w-[160px] md:w-[200px] text-center hover:text-blue-500 bg-white border-2 border-slate-200 hover:border-blue-400 hover:shadow-md rounded-xl transition-all';
                    blankArea.innerHTML = `( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; )`;
                    blankArea.onclick = () => handleBlankClick(item.n, item.a, blankArea);
                }
                div.appendChild(blankArea);

                // 題目詞語
                const titleSpan = document.createElement('span');
                titleSpan.className = 'font-black text-slate-800 tracking-wide text-2xl md:text-3xl drop-shadow-sm flex-1';
                titleSpan.textContent = item.t;
                div.appendChild(titleSpan);
                
                // 智慧注釋按鈕
                if (item.note) {
                    const noteBtn = document.createElement('button');
                    noteBtn.className = 'ml-4 px-4 py-2 bg-amber-50 text-amber-700 text-sm md:text-base font-black rounded-full border-2 border-amber-300 hover:bg-amber-100 hover:scale-105 transition-all shadow-sm shrink-0 flex items-center gap-2 group-hover:shadow-md';
                    noteBtn.innerHTML = `💡<span class="hidden sm:inline">注釋</span>`;
                    noteBtn.onclick = (e) => showAnnotation(item.t, item.note, e);
                    div.appendChild(noteBtn);
                }
                
                questionsContainer.appendChild(div);
            });
        }

        // --- 互動邏輯 ---
        function selectOption(optData, btnElement) {
            playClickSound(); // 點擊音效
            if (btnElement.classList.contains('used')) return;

            document.querySelectorAll('.option-btn').forEach(b => b.classList.remove('active'));
            
            if (activeOption && activeOption.letter === optData.letter) {
                activeOption = null;
                return;
            }

            activeOption = optData;
            btnElement.classList.add('active');
        }

        function handleBlankClick(itemNum, correctAnswer, element) {
            if (!activeOption) {
                playErrorSound();
                element.classList.add('shake-anim');
                element.innerHTML = "( 請先選上方答案 )";
                element.classList.replace('text-slate-300', 'text-rose-500');
                element.classList.replace('border-slate-200', 'border-rose-300');
                element.classList.add('bg-rose-50');
                setTimeout(() => {
                    element.classList.remove('shake-anim');
                    element.innerHTML = "( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; )";
                    element.classList.replace('text-rose-500', 'text-slate-300');
                    element.classList.replace('border-rose-300', 'border-slate-200');
                    element.classList.remove('bg-rose-50');
                }, 800);
                return;
            }

            if (activeOption.meaning === correctAnswer) {
                // 答對邏輯
                playSuccessSound();

                progressData[currentLevelData.id].answers[itemNum] = true;
                progressData[currentLevelData.id].correct = Object.keys(progressData[currentLevelData.id].answers).length;
                saveProgress();

                element.classList.add('filled', 'pop-anim');
                element.classList.replace('text-slate-300', 'text-green-700');
                element.classList.replace('bg-white', 'bg-green-50');
                element.classList.replace('border-slate-200', 'border-green-300');
                element.classList.replace('hover:border-blue-400', 'hover:border-green-300');
                element.classList.remove('cursor-pointer', 'hover:text-blue-500', 'hover:shadow-md');
                element.onclick = null;
                element.innerHTML = `( <span class="tracking-widest ml-1">${activeOption.letter} ${correctAnswer}</span> )`;

                if (isOptionFullyUsed(correctAnswer)) {
                    document.getElementById(`opt-btn-${activeOption.letter}`).classList.add('used');
                    document.getElementById(`opt-btn-${activeOption.letter}`).classList.remove('active');
                    activeOption = null;
                }

                // 檢查是否全過關
                if (progressData[currentLevelData.id].correct === currentLevelData.items.length) {
                    setTimeout(() => {
                        playCheerSound();
                        fireConfetti(); // 觸發彩帶
                        setTimeout(() => {
                            alert("🎉 太神啦！您已完成本關卡的所有配對！\n請記得將答案填寫到講義中。");
                            returnToMenu();
                        }, 1500);
                    }, 500);
                }
            } else {
                // 答錯邏輯
                playErrorSound();
                element.classList.add('shake-anim');
                element.innerHTML = "( <span class='text-rose-600'>配對錯誤</span> )";
                element.classList.replace('border-slate-200', 'border-rose-400');
                setTimeout(() => {
                    element.classList.remove('shake-anim');
                    element.innerHTML = "( &nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp; )";
                    element.classList.replace('border-rose-400', 'border-slate-200');
                }, 500);
            }
        }

        function isOptionFullyUsed(meaning) {
            const itemsWithThisMeaning = currentLevelData.items.filter(item => item.a === meaning);
            const answeredItems = itemsWithThisMeaning.filter(item => progressData[currentLevelData.id].answers[item.n]);
            return itemsWithThisMeaning.length === answeredItems.length;
        }

        function saveProgress() {
            localStorage.setItem('metonymy_progress_deluxe', JSON.stringify(progressData));
        }

        // --- 全螢幕注釋邏輯 ---
        function showAnnotation(title, text, event) {
            event.stopPropagation();
            playClickSound();
            const modal = document.getElementById('annotation-modal');
            const titleEl = document.getElementById('annotation-title');
            const textEl = document.getElementById('annotation-text');
            
            titleEl.innerHTML = `<span class="bg-gradient-to-r from-indigo-600 to-purple-600 text-transparent bg-clip-text">「${title}」</span>`;
            textEl.innerHTML = text; 
            
            modal.classList.add('show');
        }

        function closeAnnotation() {
            const modal = document.getElementById('annotation-modal');
            if (modal.classList.contains('show')) {
                playClickSound();
                modal.classList.remove('show');
            }
        }

        window.onload = initMenu;

    </script>
</body>
</html>
